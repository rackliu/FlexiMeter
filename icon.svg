<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Primary Green Gradient for Route/Stem -->
    <linearGradient id="route-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Secondary Amber Gradient for Speed/Meter Bar -->
    <linearGradient id="meter-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Background Grid/Radar (Subtle details for tech vibe) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#1e293b" stroke-width="2" opacity="0.3" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1e293b" stroke-width="2" opacity="0.2" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="#1e293b" stroke-width="2" opacity="0.1" />
  
  <!-- GPS Grid Lines (Subtle) -->
  <line x1="256" y1="40" x2="256" y2="472" stroke="#1e293b" stroke-width="2" opacity="0.15" stroke-dasharray="8 8" />
  <line x1="40" y1="256" x2="472" y2="256" stroke="#1e293b" stroke-width="2" opacity="0.15" stroke-dasharray="8 8" />

  <!-- The "F" Monogram (Route + Meter) -->
  <!-- 1. The stem & top curve (Route) -->
  <path d="M 190 390 L 190 220 C 190 170, 220 150, 270 150 L 330 150" 
        fill="none" 
        stroke="url(#route-grad)" 
        stroke-width="44" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />

  <!-- 2. The middle bar (Meter / Speed Bar) -->
  <path d="M 190 265 L 300 265" 
        fill="none" 
        stroke="url(#meter-grad)" 
        stroke-width="32" 
        stroke-linecap="round"
        filter="url(#glow)" />

  <!-- Start Point (Location Dot) -->
  <circle cx="190" cy="390" r="16" fill="#10b981" stroke="#ffffff" stroke-width="6" />

  <!-- Navigation Pointer Arrow at top end -->
  <g transform="translate(330, 150) rotate(0)">
    <path d="M -15 -18 L 22 0 L -15 18 L -6 0 Z" fill="#fbbf24" filter="url(#glow)" />
  </g>
</svg>
